<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Concern Worldwide — Mobile Prototype v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #0b7b51;
    --green-dark: #015d59;
    --green-deep: #00734a;
    --red: #cc2936;
    --white: #ffffff;
    --off-white: #f5f5f3;
    --grey: #f0f0ee;
    --grey-mid: #d8dade;
    --text: #1a1a1a;
    --text-muted: #555;
    --font: 'IBM Plex Sans', sans-serif;
  }

  html { font-family: var(--font); color: var(--text); background: var(--white); }

  /* ─── RESPONSIVE: fills mobile, caps at tablet ─── */
  body {
    max-width: 375px;
    width: 100%;
    margin: 0 auto;
    background: var(--white);
    box-shadow: 0 0 0px rgba(0,0,0,.12);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--white);
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--grey-mid);
    position: sticky;
    top: 0;
    z-index: 100;
    height: 64px;
    overflow: hidden;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }

  .header-menu-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 2px;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .header-menu-btn .burger-lines { display: flex; flex-direction: column; gap: 4px; }
  .header-menu-btn .burger-lines span {
    display: block; width: 22px; height: 2.5px;
    background: var(--green); border-radius: 2px;
  }
  .header-menu-btn .menu-label {
    font-size: 10px; font-weight: 700; letter-spacing: .06em;
    color: var(--green); margin-top: 3px; font-family: var(--font);
    text-transform: uppercase;
  }

  .header-logo {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  .header-logo img { height: 40px; width: auto; display: block; }

  .header-right { display: flex; align-items: stretch; flex-shrink: 0; }

  .header-search-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0 14px; color: var(--green);
  }
  .header-search-btn svg { width: 22px; height: 22px; }

  .btn-donate-header {
    background: #b5003c; color: var(--white);
    border: none;
    padding: 0 20px;
    font-family: var(--font); font-weight: 800;
    font-size: 14px; cursor: pointer; letter-spacing: .06em;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center;
    text-transform: uppercase; white-space: nowrap;
  }
  .btn-donate-header:active { background: #8e002e; }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    overflow: hidden;
    background: #1a3a2e;
    min-height: 520px;
    display: flex;
    flex-direction: column;
  }

  .hero-img {
    width: 100%; height: 280px;
    object-fit: cover; object-position: center top;
    display: block;
  }

  .hero-content {
    background: var(--green-dark);
    padding: 24px 20px 28px;
    flex: 1;
  }

  .hero-title {
    font-size: 22px; font-weight: 700; line-height: 1.25;
    color: var(--white); margin-bottom: 10px;
  }

  .hero-subtitle {
    font-size: 14px; line-height: 1.55;
    color: rgba(255,255,255,.85); margin-bottom: 20px;
  }

  .hero-actions { display: flex; flex-direction: column; gap: 12px; }

  .btn-primary {
    background: var(--white); color: var(--green-dark);
    border: none; border-radius: 4px;
    padding: 13px 20px; font-family: var(--font); font-weight: 700;
    font-size: 15px; cursor: pointer; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    text-decoration: none; letter-spacing: .01em;
  }

  .btn-primary svg { width: 6px; height: 10px; flex-shrink: 0; }

  .link-learn {
    color: var(--white); font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    text-decoration: none; padding: 2px 0;
  }

  .link-learn svg { width: 6px; height: 10px; }

  /* ─── SECTION HEADING ─── */
  .section-heading {
    font-size: 20px; font-weight: 700; color: var(--text);
    padding: 24px 20px 16px;
  }

  /* ─── TILE GRID (other ways) ─── */
  .tiles-section { background: var(--white); }

  .tiles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--grey-mid);
    margin: 0;
  }

  .tile {
    background: var(--white);
    overflow: hidden;
    display: flex; flex-direction: column;
    cursor: pointer;
    text-decoration: none; color: inherit;
  }

  .tile-img {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover; display: block;
  }

  .tile-info {
    padding: 12px 12px 14px;
    display: flex; flex-direction: column; gap: 10px; flex: 1;
  }

  .tile-title { font-size: 13px; font-weight: 700; line-height: 1.3; }

  .btn-tile {
    border: none; border-radius: 3px;
    padding: 8px 10px; font-family: var(--font); font-weight: 600;
    font-size: 12px; cursor: pointer; display: flex;
    align-items: center; gap: 5px; align-self: flex-start;
    text-decoration: none;
  }
  .btn-tile.secondary { background: var(--green-dark); color: var(--white); }
  .btn-tile.primary   { background: var(--green); color: var(--white); }
  .btn-tile.emergency { background: var(--red); color: var(--white); }
  .btn-tile svg { width: 5px; height: 8px; }

  /* ─── MONEY SECTION ─── */
  .money-section {
    background: var(--grey);
    padding: 28px 20px;
  }

  .money-logo { margin-bottom: 16px; }
  .money-logo img { height: 28px; }

  .money-strapline {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted); margin-bottom: 4px; font-weight: 600;
  }

  .money-amount {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px;
  }
  .money-large { font-size: 48px; font-weight: 700; color: var(--green-dark); line-height: 1; }
  .money-sub   { font-size: 14px; color: var(--text-muted); font-weight: 400; }

  .money-desc  { font-size: 14px; line-height: 1.5; color: var(--text); margin-bottom: 16px; }
  .money-desc strong { color: var(--green-dark); }

  .money-toggle {
    font-size: 13px; color: var(--green-dark); font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    background: none; border: none; font-family: var(--font); padding: 0;
    text-decoration: underline; text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  .money-breakdown {
    margin-top: 20px;
    display: none;
    gap: 12px;
    flex-direction: column;
  }
  .money-breakdown.open { display: flex; }

  .money-item {
    background: var(--white); border-radius: 6px; padding: 14px;
    border-left: 3px solid var(--green);
  }

  .money-item-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 6px; gap: 8px;
  }

  .money-item-label { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
  .money-item-amount { font-size: 20px; font-weight: 700; color: var(--green-dark); white-space: nowrap; }
  .money-item-p { font-size: 12px; line-height: 1.5; color: var(--text-muted); }

  /* ─── MORE WAYS ─── */
  .more-ways { padding: 0 0 4px; background: var(--white); }

  .more-ways-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0; border-top: 1px solid var(--grey-mid);
  }

  .more-ways-item {
    padding: 18px 14px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; text-align: center;
    border-right: 1px solid var(--grey-mid);
    border-bottom: 1px solid var(--grey-mid);
    text-decoration: none; color: var(--text);
    cursor: pointer;
  }
  .more-ways-item:nth-child(2n) { border-right: none; }

  .more-ways-icon { width: 40px; height: 40px; }
  .more-ways-label { font-size: 12px; font-weight: 600; line-height: 1.3; }

  /* ─── NEWS ─── */
  .news-section { background: var(--white); }

  .news-list { display: flex; flex-direction: column; }

  .news-item {
    display: flex; gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--grey-mid);
    text-decoration: none; color: inherit;
    cursor: pointer;
  }

  .news-item-img {
    width: 88px; height: 60px;
    object-fit: cover; border-radius: 3px; flex-shrink: 0;
  }

  .news-item-body { flex: 1; min-width: 0; }

  .news-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--green-dark); margin-bottom: 4px;
  }

  .news-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }

  .news-title {
    font-size: 13px; font-weight: 600; line-height: 1.35;
    color: var(--text); display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  .btn-all-news {
    display: block; margin: 16px 20px 4px; padding: 13px 20px;
    border: 2px solid var(--green-dark); color: var(--green-dark);
    background: var(--white); border-radius: 4px;
    font-family: var(--font); font-weight: 700; font-size: 14px;
    text-align: center; cursor: pointer; text-decoration: none;
    letter-spacing: .01em;
  }

  /* ─── WHAT WE DO ─── */
  .what-section { background: var(--grey); padding-bottom: 8px; }

  .what-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--grey-mid); margin: 0;
  }

  .what-card {
    background: var(--white); overflow: hidden;
    text-decoration: none; color: inherit; cursor: pointer;
    display: flex; flex-direction: column;
  }

  .what-card-img {
    width: 100%; aspect-ratio: 16/9;
    object-fit: cover; display: block;
  }

  .what-card-body { padding: 10px 12px 12px; flex: 1; }

  .what-card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .what-card-desc  { font-size: 11px; line-height: 1.45; color: var(--text-muted); }

  /* ─── IMPACT ─── */
  .impact-section {
    background: var(--green-dark); color: var(--white);
    padding: 28px 20px;
  }

  .impact-section .section-heading { color: var(--white); padding: 0 0 20px; }

  .impact-list { display: flex; flex-direction: column; gap: 20px; }

  .impact-item { display: flex; align-items: center; gap: 16px; }

  .impact-icon { width: 52px; height: 52px; flex-shrink: 0; }

  .impact-number {
    font-size: 28px; font-weight: 700; line-height: 1;
    color: var(--white);
  }

  .impact-label { font-size: 13px; color: rgba(255,255,255,.8); margin-top: 2px; }

  /* ─── CTA BANNER ─── */
  .cta-banner {
    position: relative; overflow: hidden;
    background: var(--green-dark);
  }

  .cta-banner-img {
    width: 100%; height: 200px; object-fit: cover; display: block;
    filter: brightness(.55);
  }

  .cta-banner-body {
    padding: 20px 20px 28px;
    background: var(--green-dark);
  }

  .cta-banner-title {
    font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 16px;
  }

  .cta-stats {
    list-style: none; display: flex; flex-direction: column;
    gap: 8px; margin-bottom: 20px;
  }

  .cta-stats li {
    font-size: 13px; color: rgba(255,255,255,.85);
    padding-left: 16px; position: relative; line-height: 1.4;
  }

  .cta-stats li::before {
    content: '→'; position: absolute; left: 0;
    color: rgba(255,255,255,.5); font-size: 11px; top: 1px;
  }

  .btn-cta-donate {
    background: var(--white); color: var(--green-dark);
    border: none; border-radius: 4px;
    padding: 14px 24px; font-family: var(--font); font-weight: 700;
    font-size: 15px; cursor: pointer; display: flex;
    align-items: center; gap: 8px; text-decoration: none;
    width: 100%; justify-content: center;
  }

  .btn-cta-donate svg { width: 6px; height: 10px; }

  /* ─── HOW YOU CAN HELP ─── */
  .help-section { background: var(--off-white); padding-bottom: 8px; }

  .help-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--grey-mid);
  }

  .help-item {
    padding: 18px 8px 16px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; text-align: center;
    border-right: 1px solid var(--grey-mid);
    border-bottom: 1px solid var(--grey-mid);
    text-decoration: none; color: var(--text);
    cursor: pointer;
  }
  .help-item:nth-child(3n) { border-right: none; }

  .help-icon { width: 36px; height: 36px; }
  .help-label { font-size: 11px; font-weight: 600; line-height: 1.3; }

  /* ─── FOOTER ─── */
  .footer { background: var(--green-dark); color: rgba(255,255,255,.85); }

  .footer-menu { padding: 28px 20px 20px; }

  .footer-group { margin-bottom: 20px; }
  .footer-group-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--white); margin-bottom: 10px;
  }
  .footer-links { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .footer-links a {
    font-size: 13px; color: rgba(255,255,255,.75);
    text-decoration: none;
  }

  .footer-social {
    display: flex; gap: 16px; padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,.15);
    border-bottom: 1px solid rgba(255,255,255,.15);
  }

  .footer-social a {
    color: rgba(255,255,255,.7); display: flex;
    align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: rgba(255,255,255,.08); border-radius: 50%;
  }
  .footer-social svg { width: 16px; height: 16px; }

  .footer-bottom {
    padding: 16px 20px 28px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .footer-logos { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .footer-logos img { height: 28px; filter: brightness(0) invert(1) opacity(.65); }

  .footer-copy { font-size: 11px; line-height: 1.55; color: rgba(255,255,255,.5); }

  .footer-small-links {
    display: flex; flex-wrap: wrap; gap: 10px;
    font-size: 11px;
  }
  .footer-small-links a {
    color: rgba(255,255,255,.55); text-decoration: none;
  }

  /* ─── SCROLL BEHAVIOURS ─── */
  .header {
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }
  .header.hidden {
    transform: translateY(-100%);
  }

  /* ─── BOTTOM DONATION BAR ─── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 375px;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 18px;
    z-index: 200;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 -2px 16px rgba(0,0,0,.18);
  }

  .bottom-bar.visible {
    transform: translateX(-50%) translateY(0);
  }

  .bottom-bar-label {
    font-family: var(--font); font-weight: 700;
    font-size: 15px; color: var(--white);
    letter-spacing: .01em;
  }

  .bottom-bar-btn {
    background: #b5003c;
    color: var(--white);
    border: none; border-radius: 50px;
    padding: 12px 22px;
    font-family: var(--font); font-weight: 700; font-size: 15px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; letter-spacing: .01em;
    text-decoration: none;
    transition: background .15s;
  }

  .bottom-bar-btn:active { background: #8e002e; }

  .bottom-bar-btn-heart {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* pad page bottom so content isn't hidden behind bar */
  body { padding-bottom: 72px; }

</style>
<style>
  /* ─── V2 OVERRIDES ─── */
  body {
    width: 375px;
    max-width: 375px;
    min-width: 375px;
  }

  .placeholder-body {
    display: block;
    width: 375px;
    line-height: 0;
  }

  .placeholder-body img {
    width: 375px;
    display: block;
  }
</style>
</head>

<script>
  function toggleBreakdown(btn) {
    const bd = document.getElementById('money-breakdown');
    const open = bd.classList.toggle('open');
    btn.textContent = open ? 'Hide breakdown ▴' : 'See how the rest is spent ▾';
  }

  // ─── Scroll-aware header + bottom bar ───
  const header    = document.querySelector('.header');
  const bottomBar = document.getElementById('bottom-bar');

  let lastY   = 0;
  let ticking = false;
  const THRESHOLD = 160;

  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const y = window.scrollY;

        if (y <= 10) {
          header.classList.remove('hidden');
          bottomBar.classList.remove('visible');
        } else if (y > lastY && y > THRESHOLD) {
          // Scrolling DOWN
          header.classList.add('hidden');
          bottomBar.classList.add('visible');
        } else if (y < lastY) {
          // Scrolling UP
          header.classList.remove('hidden');
          bottomBar.classList.remove('visible');
        }

        lastY   = y;
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
</script>
